<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heritage Hub - Contact Us</title>
    <link rel="icon" type="image/png" href="./Assets/favicon.ico">
    
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="contact.css">
    
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/Pics/logo.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/Pics/logo.ico">
    <link rel="apple-touch-icon" href="./assets/Pics/logo.ico">
    <meta name="google-site-verification" content="rDNeEkD5ZaG2XZMLp-SoA4PHsp2YwhqiQZa2y5IDuEU" />
    <meta name="description" content="Heritage Hub - Egypt's Historical Sites">
    <meta name="keywords" content="Heritage Hub - Egypt heritage in one place" />
</head>
<body class="contact-page">
<header class="site-header">
    <div class="topbar">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="./assets/Pics/logo.ico" alt="Heritage Hub Logo" class="site-logo">
                <span class="logo-text">Heritage Hub</span>
            </a>
        </div>

        <nav class="top-nav">
            <a href="index.html">Home</a>
            <a href="places.html">Places</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
    <video autoplay muted loop id="bg-video">
        <source src="./assets/Videos/vid01.mp4" type="video/mp4">
    </video>
    <div class="page-overlay"></div>

    <section id="contact" class="page-section active">
        <a class="hero-btn right-home-btn" href="index.html">Home</a>
        <br>
        <br>
        <h1>Contact Us</h1>
        <p>We are looking forward to hearing from you soon.</p>
        <div class="contact-container">
            <div class="contact-info">
                <h3>Get in touch</h3>
                <div class="social-links">
                    <a href="https://www.facebook.com/profile.php?id=61589965097667" target="_blank">f</a>
                    <a href="https://twitter.com" target="_blank">𝕏</a>
                    <a href="https://www.instagram.com/heritagehubeg/" target="_blank">IG</a>
                </div>
            </div>
            <div class="contact-form">
                <form action="#" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="user_name" placeholder="NAME" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="user_email" placeholder="EMAIL" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone:</label>
                            <input type="tel" id="phone" name="user_phone" placeholder="PHONE">
                        </div>
                        <div class="form-group">
                            <label for="address">Address:</label>
                            <input type="text" id="address" name="user_address" placeholder="ADDRESS">
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="message">Message:</label>
                            <textarea id="message" name="user_message" rows="5" placeholder="MESSAGE" required></textarea>
                        </div>
                    </div>
                    <button type="submit">DONE</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <p>&copy; 2026 Heritage Hub. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
